<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#008238">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VRR Abfahrtsmonitor</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Theme früh setzen, bevor CSS rendert (kein Aufblitzen)
    try {
      var t = JSON.parse(localStorage.getItem("vrr_theme"));
      if (t && t !== "light") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="conn-banner" class="conn-banner hidden"></div>

    <!-- Display-Modus -->
    <section id="display-view">
      <div id="display-grid" class="display-grid layout-single"></div>
      <nav id="tabbar" class="tabbar"></nav>
    </section>

    <!-- Settings-Modus -->
    <section id="settings-view" class="hidden"></section>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
